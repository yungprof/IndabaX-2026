name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Static syntax check
        run: |
          python -m py_compile app.py batch_predict.py features.py train.py monitor_drift.py

      - name: Training smoke test
        run: |
          python train.py --data-path "WA_Fn-UseC_-Telco-Customer-Churn 2.csv" --sample-size 400 --skip-mlflow

      - name: Build Docker image
        run: |
          docker build -t telecom-churn-api:ci .

